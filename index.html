<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Mapa Territorios</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3388ff">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
}

#map{
    width:100%;
    height:100vh;
}

button{
    cursor:pointer;
    font-size:14px;
}

#login,
#toggleLocation,
#misPuntos,
#verNotas,
#editarMallas,
#verRanking,
#administrarAdmins,
#administrarPuntos,
#toggleClima{

    position:absolute;
    right:10px;
    z-index:1000;

    padding:8px 10px;

    border:none;
    border-radius:8px;

    background:white;

    box-shadow:0 0 5px rgba(0,0,0,.3);
}

/* SIEMPRE VISIBLES */

#login{
    top:10px;
}

#toggleLocation{
    top:50px;
}

/* SOLO ADMIN */

#verNotas{
    top:90px;
    display:none;
}

#editarMallas{
    top:130px;
    display:none;
}

#verRanking{
    top:170px;
    display:none;
}

#administrarAdmins{
    top:210px;
    display:none;
}

#administrarPuntos{
    top:250px;
    display:none;
}

#misPuntos{
    top:290px;
    display:none;
}

#toggleClima{
    top:330px;
    display:none;
}

/* PANELES */

.panel{

    display:none;

    position:absolute;

    top:340px;
    right:10px;

    width:300px;
    max-height:400px;

    overflow:auto;

    background:white;

    padding:10px;

    border-radius:10px;

    z-index:1000;

    box-shadow:0 0 10px rgba(0,0,0,.3);

}

#estadoConexion{

    position:absolute;

    bottom:10px;
    left:10px;

    z-index:1000;

    background:white;

    padding:8px 12px;

    border-radius:10px;

    box-shadow:0 0 5px rgba(0,0,0,.3);

}

input{
    font-size:14px;
}

/* =========================
   NOMBRE DE LOS PUNTOS
========================= */

.nombrePuntoAdmin{

    background:rgba(255,255,255,.95);

    border:1px solid #333;

    border-radius:8px;

    padding:4px 8px;

    color:#000;

    font-weight:bold;

    font-size:13px;

    box-shadow:0 0 6px rgba(0,0,0,.35);

}

/* =========================
   NOMBRE DE LOS TERRITORIOS
========================= */

.nombreTerritorio{

    background:transparent !important;

    border:none !important;

    box-shadow:none !important;

    color:white;

    font-size:18px;

    font-weight:bold;

    text-shadow:
        -2px -2px 3px black,
         2px -2px 3px black,
        -2px  2px 3px black,
         2px  2px 3px black;

    pointer-events:none;

}

.nombreTerritorio::before{

    display:none !important;

}


</style>

</head>

<body>

<div id="map"></div>

<!-- SIEMPRE VISIBLES -->

<button id="login">🔐 Login Admin</button>

<button id="toggleLocation">📍 Mi ubicación</button>

<button id="misPuntos">⭐ Mis puntos</button>

<button id="toggleClima">🌤 Clima</button>

<!-- SOLO ADMIN -->

<button id="verNotas">📄 Ver notas</button>

<button id="editarMallas">🗺️ Editar mallas</button>

<button id="verRanking">🏆 Ranking</button>

<button id="administrarAdmins">👥 Administradores</button>

<button id="administrarPuntos">📍 Puntos</button>

<div id="estadoConexion">
🌐 Online
</div>

<!-- NOTAS -->

<div id="notas-section" class="panel">

<h3>📫 Notas</h3>

<button onclick="cerrarNotas()">Cerrar</button>

<div id="lista-notas"></div>

</div>

<!-- MALLAS -->

<div id="mallas-section" class="panel">

<h3>🗺️ Mallas</h3>

<button onclick="cerrarMallas()">Cerrar</button>

<div id="lista-mallas"></div>

</div>

<!-- RANKING -->

<div id="ranking-section" class="panel">

<h3>🏆 Ranking</h3>

<button onclick="cerrarRanking()">Cerrar</button>

<h4>🚩 Más completadas</h4>

<div id="ranking-completadas"></div>

<h4>🕒 Últimas notas</h4>

<div id="ranking-recientes"></div>

</div>

<!-- ADMINISTRADORES -->

<div id="admins-section" class="panel">

<h3>👥 Administradores</h3>

<button onclick="cerrarAdmins()">Cerrar</button>

<div id="lista-admins"></div>

<hr>

<input
id="nuevoAdminEmail"
type="email"
placeholder="Correo del nuevo administrador"
style="width:100%;margin-bottom:10px;"
>

<button id="agregarAdmin">
Agregar administrador
</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script type="module" src="app.js"></script>

</body>
</html>
