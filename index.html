<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Mapa Territorios</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3388ff">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
}

#map{
    width:100%;
    height:100vh;
}

button{
    cursor:pointer;
    font-size:14px;
}


#toggleLocation,
#verNotas,
#editarMallas,
#administrarAdmins,
#administrarPuntos,
#toggleClima{

    position:absolute;
    right:10px;
    z-index:1000;

    padding:8px 10px;

    border:none;
    border-radius:8px;

    background:white;

    box-shadow:0 0 5px rgba(0,0,0,.3);
}

#login{

    width:100%;

    padding:12px;

    border:none;

    border-radius:8px;

    background:#3388ff;

    color:white;

    font-size:15px;

    box-shadow:none;

}


#login{
    top:10px;
}


#toggleLocation{
    top:50px;
}


#verNotas{
    top:90px;
    display:none;
}


#editarMallas{
    top:130px;
    display:none;
}


#administrarAdmins{
    top:170px;
    display:none;
}


#administrarPuntos{
    top:210px;
    display:none;
}


#toggleClima{
    top:250px;
    display:none;
}


.panel{

    display:none;

    position:absolute;

    top:300px;
    right:10px;

    width:300px;
    max-height:400px;

    overflow:auto;

    background:white;

    padding:10px;

    border-radius:10px;

    z-index:1000;

    box-shadow:0 0 10px rgba(0,0,0,.3);

}


#estadoConexion{

    position:absolute;

    bottom:10px;
    left:10px;

    z-index:1000;

    background:white;

    padding:8px 12px;

    border-radius:10px;

    box-shadow:0 0 5px rgba(0,0,0,.3);

}



.nombrePuntoAdmin{

    background:rgba(255,255,255,.90);

    border:1px solid #666;

    border-radius:6px;

    padding:2px 5px;

    color:#000;

    font-weight:bold;

    font-size:10px;

    white-space:nowrap;

}


.iconoPuntoMapa{

    font-size:18px;

    width:24px;
    height:24px;

    display:flex;

    align-items:center;
    justify-content:center;

    text-shadow:
    0 0 2px white,
    0 0 4px black;

}

.nombreTerritorio{

    background:transparent !important;

    border:none !important;

    box-shadow:none !important;

    color:white;

    font-size:15px;

    font-weight:bold;

    text-shadow:
        -1.5px -1.5px 2px black,
         1.5px -1.5px 2px black,
        -1.5px  1.5px 2px black,
         1.5px  1.5px 2px black;

    pointer-events:none;

}

.nombreTerritorio::before{

    display:none !important;

}

/*=========================
PANTALLA INICIAL
=========================*/

#pantallaInicio{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.55);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:5000;

}

#loginBox{

    width:360px;

    background:white;

    border-radius:14px;

    padding:25px;

    text-align:center;

    box-shadow:0 0 20px rgba(0,0,0,.35);

}

#loginBox h1{

    margin-top:0;

}

#loginBox button{

    width:100%;

    margin-top:10px;

    padding:12px;

    border:none;

    border-radius:8px;

    font-size:15px;

}

#continuarInvitado{

    background:#e5e5e5;

}


</style>

</head>


<body>

<div id="map"></div>

<!-- =========================
     PANTALLA DE BIENVENIDA
========================= -->

<div id="pantallaInicio">

    <div id="loginBox">

        <h1>🗺️ Mapa Territorios</h1>

        <p>
            Para acceder a todas las funciones
            iniciá sesión.
        </p>

        <button id="login">
            🔐 Iniciar sesión con Google
        </button>

        <button id="continuarInvitado">
            👁️ Continuar como invitado
        </button>

        <hr>

        <small>
            Los usuarios registrados deben ser
            aprobados por un administrador.
            Registrarse no otorga permisos de administrador.
        </small>

    </div>

</div>


<!-- =========================
BOTONES
========================= -->

<button id="toggleLocation">📍 Mi ubicación</button>

<button id="toggleClima">🌤 Clima</button>

<button id="verNotas">📄 Ver notas</button>

<button id="editarMallas">🗺️ Editar mallas</button>

<button id="administrarAdmins">👥 Administradores</button>

<button id="administrarPuntos">📍 Puntos</button>

<div id="estadoConexion">
🌐 Online
</div>


<!-- =========================
PANEL NOTAS
========================= -->

<div id="notas-section" class="panel">

<h3>📫 Notas</h3>

<button onclick="cerrarNotas()">Cerrar</button>

<div id="lista-notas"></div>

</div>


<!-- =========================
PANEL MALLAS
========================= -->

<div id="mallas-section" class="panel">

<h3>🗺️ Mallas</h3>

<button onclick="cerrarMallas()">Cerrar</button>

<div id="lista-mallas"></div>

</div>


<!-- =========================
PANEL ADMINS
========================= -->

<div id="admins-section" class="panel">

<h3>👥 Administradores</h3>

<button onclick="cerrarAdmins()">Cerrar</button>

<!-- Lista de administradores -->
<div id="lista-admins"></div>

<hr>

<h3>📨 Solicitudes de usuarios</h3>

<div id="lista-solicitudes"></div>

<hr>

<input
id="nuevoAdminEmail"
type="email"
placeholder="Correo del nuevo administrador"
style="width:100%;margin-bottom:10px;"
>

<button id="agregarAdmin">
Agregar administrador
</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script type="module" src="app.js"></script>

</body>
</html>
